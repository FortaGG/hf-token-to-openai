<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hf token to openai api translator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #34d399;
            --accent-hover: #10b981;
            --border-color: #334155;
            --input-bg: #0f172a;
            --font-family: system-ui, -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
        }

        .hidden {
            display: none !important;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        .btn-primary {
            width: 100%;
            padding: 0.8rem;
            background-color: var(--accent);
            color: #022c22;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .result-group {
            margin-bottom: 1.5rem;
        }

        .result-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .code-box {
            display: flex;
            align-items: center;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.5rem;
        }

        .code-box code {
            flex-grow: 1;
            padding: 0.3rem 0.5rem;
            font-family: monospace;
            color: var(--accent);
            font-size: 0.9rem;
            overflow-x: auto;
            white-space: nowrap;
        }

        .code-box.pre-box {
            align-items: flex-start;
        }

        .code-box pre {
            flex-grow: 1;
            overflow-x: auto;
            margin: 0;
        }

        .code-box.pre-box code {
            white-space: pre-wrap;
            display: block;
        }

        .btn-copy {
            background-color: var(--card-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            margin-left: 10px;
        }

        .btn-copy:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>hf token to openai api translator</h1>
        </div>
        
        <div id="form-container" class="card">
            <form id="generator-form">
                <div class="input-group">
                    <label for="token">Hugging Face Token</label>
                    <input type="text" id="token" name="token" placeholder="hf_xxxxxxxxxxxxxxxxxxxx" required />
                </div>
                
                <div class="input-group">
                    <label for="modelId">Hugging Face Model ID</label>
                    <input type="text" id="modelId" name="modelId" placeholder="e.g. meta-llama/Llama-2-7b-chat-hf" required />
                </div>
                
                <button type="submit" class="btn-primary">Generate</button>
            </form>
        </div>

        <div id="result-container" class="card hidden">
            <div class="result-group">
                <label>OpenAI API Base URL</label>
                <div class="code-box">
                    <code id="out-url"></code>
                    <button class="btn-copy" data-target="out-url">Kopiuj</button>
                </div>
            </div>

            <div class="result-group">
                <label>API Key (Token)</label>
                <div class="code-box">
                    <code id="out-token"></code>
                    <button class="btn-copy" data-target="out-token">Kopiuj</button>
                </div>
            </div>
            
            <div class="result-group">
                <label>Model ID</label>
                <div class="code-box">
                    <code id="out-model"></code>
                    <button class="btn-copy" data-target="out-model">Kopiuj</button>
                </div>
            </div>

            <div class="result-group">
                <label>cURL</label>
                <div class="code-box pre-box">
                    <pre><code id="out-curl"></code></pre>
                    <button class="btn-copy" data-target="out-curl">Kopiuj</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('generator-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const token = formData.get('token');
            const modelId = formData.get('modelId');
            
            const baseUrl = "https://api-inference.huggingface.co/v1/";
            const curl = `curl -X POST https://api-inference.huggingface.co/v1/chat/completions \\
  -H "Authorization: Bearer ${token}" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "${modelId}",
    "max_tokens": 500
  }'`;
            
            document.getElementById('out-url').textContent = baseUrl;
            document.getElementById('out-token').textContent = token;
            document.getElementById('out-model').textContent = modelId;
            document.getElementById('out-curl').textContent = curl;
            
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
        });

        document.querySelectorAll('.btn-copy').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const targetId = e.currentTarget.getAttribute('data-target');
                if (targetId) {
                    const text = document.getElementById(targetId).textContent;
                    navigator.clipboard.writeText(text);
                    
                    const originalText = btn.textContent;
                    btn.textContent = 'Skopiowano!';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                }
            });
        });
    </script>
</body>
</html>
